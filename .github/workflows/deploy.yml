name: Deploy

on:
  push:
    branches:
      - main

jobs:
  # ── Detect which apps changed ─────────────────────────────────────────────
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'apps/api/**'
              - 'packages/db/**'
            web:
              - 'apps/web/**'

  # ── Deploy API ────────────────────────────────────────────────────────────
  deploy-api:
    name: Build API → Deploy API
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      # The image runs migrations on startup (start.sh → drizzle-kit migrate)
      # so CI never needs a direct DB connection.
      - name: Build and push API image
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            --file apps/api/Dockerfile \
            --tag "$REGISTRY/$REPOSITORY:$IMAGE_TAG" \
            --tag "$REGISTRY/$REPOSITORY:latest" \
            .
          docker push "$REGISTRY/$REPOSITORY:$IMAGE_TAG"
          docker push "$REGISTRY/$REPOSITORY:latest"

      # ECS replaces the old task with the new one. The new container runs
      # drizzle-kit migrate before starting the API — migrations run inside
      # the VPC and can reach the private RDS instance.
      #
      # Three-step dance:
      #   1. Describe the task definition currently used by the service.
      #   2. Register a new revision with only the container image swapped out
      #      (all secrets, roles, ports, log config are inherited unchanged).
      #   3. Update the service to the new revision and wait for it to stabilise.
      - name: Deploy to ECS
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
          ECS_CLUSTER: ${{ secrets.ECS_CLUSTER_NAME }}
          ECS_SERVICE: ${{ secrets.ECS_SERVICE_NAME }}
        run: |
          # Get the task definition ARN that the service is currently running
          TASK_DEF_ARN=$(aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE" \
            --query 'services[0].taskDefinition' \
            --output text)

          # Build a new revision JSON: keep everything, just swap the image
          NEW_TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition "$TASK_DEF_ARN" \
            --query 'taskDefinition' \
            | jq --arg IMAGE "$REGISTRY/$REPOSITORY:$IMAGE_TAG" \
              'del(.taskDefinitionArn, .revision, .status, .requiresAttributes,
                   .placementConstraints, .compatibilities,
                   .registeredAt, .registeredBy)
               | .containerDefinitions[0].image = $IMAGE')

          NEW_TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TASK_DEF" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          # Point the service at the new revision and redeploy
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE" \
            --task-definition "$NEW_TASK_DEF_ARN" \
            --force-new-deployment \
            --output text

          echo "Waiting for ECS service to stabilize..."
          aws ecs wait services-stable \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE"
          echo "ECS service is stable."

  # ── Deploy Web ────────────────────────────────────────────────────────────
  deploy-web:
    name: Build Web → Upload Web
    # Always depend on deploy-api so that when both apps change in the same
    # commit, the API (and its DB migrations) finish before the new SPA goes
    # live. When only the web changed, deploy-api is skipped and this job
    # still runs — the `skipped` result is explicitly allowed below.
    needs: [changes, deploy-api]
    if: |
      always() &&
      needs.changes.result == 'success' &&
      needs.changes.outputs.web == 'true' &&
      (needs.deploy-api.result == 'success' || needs.deploy-api.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Build web app
        run: pnpm --filter @vexillo/web build

      - name: Upload web assets to S3
        env:
          S3_BUCKET: ${{ secrets.S3_BUCKET_NAME }}
        run: |
          aws s3 sync apps/web/dist/ "s3://$S3_BUCKET/" \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html"
          # index.html must not be cached — CDN serves it for SPA deep links.
          aws s3 cp apps/web/dist/index.html "s3://$S3_BUCKET/index.html" \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Invalidate CloudFront cache
        env:
          DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "$DISTRIBUTION_ID" \
            --paths "/*"
